<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Bold X -->
  <path d="M300,260 L430,260 L512,390 L594,260 L724,260 L590,470 L724,680 L594,680 L512,550 L430,680 L300,680 L434,470 Z"
        fill="url(#accent)" opacity="0.95"/>
  <!-- Sparkle top-right -->
  <g transform="translate(760, 240)" fill="url(#spark)">
    <path d="M0,-50 C8,-8 8,-8 50,0 C8,8 8,8 0,50 C-8,8 -8,8 -50,0 C-8,-8 -8,-8 0,-50Z"/>
  </g>
  <!-- Sparkle small -->
  <g transform="translate(820, 380) scale(0.5)" fill="url(#spark)" opacity="0.7">
    <path d="M0,-50 C8,-8 8,-8 50,0 C8,8 8,8 0,50 C-8,8 -8,8 -50,0 C-8,-8 -8,-8 0,-50Z"/>
  </g>
  <!-- "muggle" text -->
  <text x="512" y="870" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="160" font-weight="700" fill="#e2e8f0" letter-spacing="10">muggle</text>
</svg>
