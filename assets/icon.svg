<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="12" y="12" width="1000" height="1000" rx="210" fill="none" stroke="#0f3460" stroke-width="24"/>
  <!-- X shape - two bold crossed strokes -->
  <line x1="280" y1="280" x2="744" y2="744" stroke="#e94560" stroke-width="120" stroke-linecap="round"/>
  <line x1="744" y1="280" x2="280" y2="744" stroke="#e94560" stroke-width="120" stroke-linecap="round"/>
</svg>
